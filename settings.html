<div class="pk-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Prompt Keeper</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <!-- 启用开关 -->
            <div class="pk-setting-item">
                <label>
                    <input type="checkbox" id="pk-enabled" checked>
                    启用插件
                </label>
            </div>

            <!-- 恢复模式选择 -->
            <div class="pk-setting-item">
                <label for="pk-restore-mode">恢复模式：</label>
                <select id="pk-restore-mode" class="text_pole">
                    <option value="auto">自动恢复</option>
                    <option value="ask">询问恢复</option>
                    <option value="notify">仅提示</option>
                </select>
            </div>

            <hr>

            <!-- 模式说明 -->
            <small class="pk-description">
                <strong>自动恢复：</strong>切换聊天时自动恢复已保存的 Prompt Entry 配置<br>
                <strong>询问恢复：</strong>切换聊天时弹出确认对话框，由用户决定是否恢复<br>
                <strong>仅提示：</strong>显示通知提醒，用户可手动点击按钮恢复
            </small>

            <hr>

            <!-- 插件信息 -->
            <small class="pk-description">
                <strong>版本：</strong>1.0.0<br>
                <strong>作者：</strong>sisjzknxhnsnejxn-cmyk<br>
                <strong>主页：</strong><a href="https://github.com/sisjzknxhnsnejxn-cmyk/prompt-keeper" target="_blank">GitHub</a>
            </small>
        </div>
    </div>
</div>
