<div class="prompt-keeper-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Prompt Keeper</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="prompt-keeper-settings-inner">
                <label class="pk-settings-label">
                    <i class="fa-solid fa-rotate-left"></i>
                    <span data-i18n="Restore Mode">Restore Mode</span>
                </label>
                <p class="pk-settings-desc">
                    Choose how Prompt Keeper restores saved configurations when switching chats.
                </p>
                <div class="pk-radio-group">
                    <label class="radio_label">
                        <input type="radio" name="pk-restore-mode" value="auto" />
                        <span data-i18n="Auto Restore">Auto Restore</span>
                        <small class="pk-radio-hint">Automatically restore saved prompt states on chat switch.</small>
                    </label>
                    <label class="radio_label">
                        <input type="radio" name="pk-restore-mode" value="ask" />
                        <span data-i18n="Ask Before Restore">Ask Before Restore</span>
                        <small class="pk-radio-hint">Show a confirmation dialog before restoring.</small>
                    </label>
                    <label class="radio_label">
                        <input type="radio" name="pk-restore-mode" value="notify" />
                        <span data-i18n="Notify Only">Notify Only</span>
                        <small class="pk-radio-hint">Show a notification that a saved config exists, but don't restore automatically.</small>
                    </label>
                </div>
                <hr class="sysHR" />
                <div class="pk-info">
                    <small>
                        <i class="fa-solid fa-circle-info"></i>
                        Prompt Keeper v1.0.0 — Saves prompt entry states per chat session.
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
